name: Sync upstream

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Add upstream and merge
        run: |
          git remote add upstream https://github.com/andyaiken/forgesteel.git
          git fetch upstream
          git checkout main
          git merge --ff-only upstream/main
          git push origin main
