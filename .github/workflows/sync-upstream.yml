name: Sync upstream

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Add upstream and merge, keeping our custom icon
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/andyaiken/forgesteel.git
          git fetch upstream
          git checkout main

          git merge --no-ff --no-commit upstream/main || true

          git checkout HEAD -- src/assets/shield.png
          git add src/assets/shield.png

          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "Unresolved conflicts remain outside shield.png:"
            git diff --name-only --diff-filter=U
            exit 1
          fi

          if git diff --cached --quiet && git diff --quiet; then
            echo "No changes from upstream today — nothing to commit."
            exit 0
          fi

          git commit -m "Sync upstream (keeping custom shield icon)"
          git push origin main
